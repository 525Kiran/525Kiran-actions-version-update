name: 'Update GitHub Actions Versions'
description: 'Automatically update GitHub Actions to their latest versions in workflow files and create a PR'
author: '525Kiran'

branding:
  icon: 'refresh-cw'
  color: 'green'

inputs:
  github-token:
    description: 'GitHub token for authentication and API requests (needs repo and workflow permissions)'
    required: false
    default: ${{ github.token }}
  git-user-name:
    description: 'Git user name for commits'
    required: false
    default: 'github-actions[bot]'
  git-user-email:
    description: 'Git user email for commits'
    required: false
    default: 'github-actions[bot]@users.noreply.github.com'
  pr-title:
    description: 'Title for the pull request'
    required: false
    default: 'chore: update github actions versions'
  pr-body:
    description: 'Body content for the pull request (will be enhanced with update details)'
    required: false
    default: |
      ## 🔄 Automated GitHub Actions Version Update
      
      This pull request updates GitHub Actions dependencies to their latest available versions.
      
      ### 📊 Updated Actions
      
      {UPDATES_TABLE}
      
      ### 🔍 Review Checklist
      
      - [ ] Review the version changes and release notes for breaking changes
      - [ ] Verify all workflows execute successfully with updated versions
      - [ ] Confirm no deprecated features are being used
      - [ ] Check for any new required inputs or configuration changes
      
      ### 📝 Notes
      
      - All updates follow semantic versioning where applicable
      - Actions using commit SHAs are intentionally skipped
      - This PR was automatically generated and should be reviewed before merging
      
      ---
      
      **Generated by:** [Action Version Update](https://github.com/525Kiran/525Kiran-actions-version-update)  
      **Timestamp:** {TIMESTAMP}
  pr-labels:
    description: 'Comma-separated labels to add to the PR'
    required: false
    default: 'automated-pr,dependencies'
  branch-prefix:
    description: 'Prefix for the branch name'
    required: false
    default: 'chore/update-github-actions'

outputs:
  updates-made:
    description: 'Whether any updates were made (true/false)'
  pr-number:
    description: 'Pull request number if created'
  pr-url:
    description: 'Pull request URL if created'

runs:
  using: 'composite'
  steps:
    - name: Configure Git
      shell: bash
      run: |
        git config user.name "${{ inputs.git-user-name }}"
        git config user.email "${{ inputs.git-user-email }}"

    - name: Update GitHub Actions versions
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: ${{ github.action_path }}/action-version-update.sh

    - name: Check for changes
      id: check_changes
      shell: bash
      run: |
        if git diff --name-only | grep -q "\.github/workflows/.*\.yml$\|\.github/workflows/.*\.yaml$"; then
          echo "updates-made=true" >> $GITHUB_OUTPUT
          echo "Changes detected in workflow files:"
          git diff --name-only | grep "\.github/workflows/.*\.yml$\|\.github/workflows/.*\.yaml$"
          
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="${{ inputs.branch-prefix }}-${TIMESTAMP}"
          echo "branch-name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "updates-made=true" >> $GITHUB_ENV
        else
          echo "updates-made=false" >> $GITHUB_OUTPUT
          echo "updates-made=false" >> $GITHUB_ENV
          echo "No workflow file changes detected"
        fi

    - name: Create Pull Request
      if: steps.check_changes.outputs.updates-made == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_TITLE: ${{ inputs.pr-title }}
        PR_BODY: ${{ inputs.pr-body }}
        PR_LABELS: ${{ inputs.pr-labels }}
        BRANCH_NAME: ${{ steps.check_changes.outputs.branch-name }}
      run: |
        # Create and push branch
        git checkout -b "$BRANCH_NAME"
        git add .github/workflows/
        git commit -m "$PR_TITLE"
        git push origin "$BRANCH_NAME"
        
        # Build updates table from log
        UPDATES_TABLE="| Action | Previous Version | Updated Version |\n|--------|------------------|-----------------|"
        if [ -f /tmp/action-updates.log ]; then
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              UPDATES_TABLE="${UPDATES_TABLE}\n${line}"
            fi
          done < /tmp/action-updates.log
        fi
        
        # Replace placeholders in PR body
        TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        PR_BODY_FINAL=$(echo "$PR_BODY" | sed "s|{UPDATES_TABLE}|${UPDATES_TABLE}|g" | sed "s|{TIMESTAMP}|${TIMESTAMP}|g")
        
        # Create PR using GitHub API
        REPO="${GITHUB_REPOSITORY}"
        BASE_BRANCH="${GITHUB_REF#refs/heads/}"
        
        # Prepare labels JSON array
        LABELS_JSON="[]"
        if [ -n "$PR_LABELS" ]; then
          LABELS_JSON=$(echo "$PR_LABELS" | awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"", $i; if(i<NF) printf ","}; printf "]"}')
        fi
        
        # Create PR
        PR_RESPONSE=$(curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$REPO/pulls" \
          -d "{
            \"title\": \"$PR_TITLE\",
            \"body\": $(echo "$PR_BODY_FINAL" | jq -Rs .),
            \"head\": \"$BRANCH_NAME\",
            \"base\": \"$BASE_BRANCH\"
          }")
        
        PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number')
        PR_URL=$(echo "$PR_RESPONSE" | jq -r '.html_url')
        
        if [ "$PR_NUMBER" != "null" ] && [ -n "$PR_NUMBER" ]; then
          echo "pr-number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr-url=$PR_URL" >> $GITHUB_OUTPUT
          echo "✅ Pull request created: $PR_URL"
          
          # Add labels if specified
          if [ -n "$PR_LABELS" ]; then
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
              -d "{\"labels\": $LABELS_JSON}"
            echo "Labels added: $PR_LABELS"
          fi
        else
          echo "Error creating PR: $PR_RESPONSE"
          exit 1
        fi